<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Digital Wallet Payment</title><style>
body{font-family:Arial;background:#f5f5f5;display:flex;justify-content:center}
.card{margin-top:40px;background:#fff;padding:24px;border-radius:12px;max-width:380px;width:100%;box-shadow:0 2px 10px #ccc}
button{width:100%;padding:14px;margin:8px 0;font-size:18px;border:0;border-radius:8px;cursor:pointer}
.v{background:#e60000;color:#fff}.o{background:#ff7a00;color:#fff}.e{background:#009966;color:#fff}.w{background:#5b2cff;color:#fff}
</style></head><body><div class="card">
<h2>Amount: <span id="amt"></span> EGP</h2>
<p>Please choose the digital wallet you want to pay</p>
<button class="v" onclick="goVod()">Vodafone Cash</button>
<button class="o" onclick="goOrange()">Orange Cash</button>
<button class="e" onclick="goE()">E& money</button>
<button class="w" onclick="goWe()">WE Pay</button>
</div>
<script>
const p=new URLSearchParams(location.search);
const a=p.get("amount")||"100";
document.getElementById("amt").textContent=a;
function goVod(){location.href="tel:*9*7*01025953190*"+a+"%23";}
function goOrange(){location.href="tel:*115*7*01025953190*"+a+"%23";}
function goWe(){location.href="tel:*7*2*01025953190%23";}
function goE(){location.href="e.html?amount="+encodeURIComponent(a);}
</script></body></html>
