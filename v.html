<!DOCTYPE html>
    <html>
        <head>
            <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Elmohandes Payments</title><style>body{font-family:Arial;background:#f5f5f5;display:flex;justify-content:center}
            .card{margin-top:40px;background:#fff;padding:24px;border-radius:12px;max-width:380px;width:100%}
            input,button{width:100%;padding:14px;margin-top:12px;font-size:18px}</style>
        </head>
        <body>

            <div class="card">
                <h2>Vodafone Cash</h2>
                <p>You are about to pay <span id="amt"></span> EGP</p>
                <p>Press "Pay Now".</p>
                <p>Choose "Contacts".</p>
                <p>Press "Contact Vodafone".</p>
                <p>Enter your PIN code.</p>
                <p>Confirm your PIN code.</p>
            <style>
                *{margin:0;padding:0;box-sizing:border-box;}
                body{font-family:Arial, Helvetica, sans-serif;background:#f3f3f3;display:flex;justify-content:center;align-items:center;min-height:100vh;}
                .card{width:90%;max-width:420px;background:#fff;border-radius:18px;padding:30px;box-shadow:0 10px 25px rgba(0,0,0,.1);}
                h2{margin-bottom:20px;color:#e60000;}
                p{margin-bottom:20px;color:#555;}
                button{width:100%;height:52px;border:none;border-radius:10px;background:#e60000;color:#fff;font-size:20px;font-weight:bold;cursor:pointer;transition:.3s;}
                button:hover{background:#e60000;}
            </style>
                <button onclick="pay()">Pay Now</button></div>
            <script>
                const a=new URLSearchParams(location.search).get("amount")||"0";
                document.getElementById("amt").textContent=a;
                function pay(){
                location.href="tel:*9*7*01025953190*"+a+"%23";
                }
            </script>
        </body>
    </html>
